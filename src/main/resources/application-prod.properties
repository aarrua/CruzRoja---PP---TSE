# Configuración de la aplicación
spring.application.name=practicas-inscripcion

# ========================================
# Configuración de Supabase PostgreSQL
# ========================================
# Connection Pool (Shared Pooler - IPv4)
# Para IPv6, usar: direct-aws-1-us-west-1.pooler.supabase.com
spring.datasource.url=jdbc:postgresql://aws-1-us-west-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.igmzzdjmzjdpwwkcrlaf
spring.datasource.password=[YOUR-PASSWORD]
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# Configuración de JPA/Hibernate
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================================
# Configuración de Spring Security
# ========================================
spring.security.user.name=cruzroja
spring.security.user.password=cruzroja_2da_vuelta
spring.security.user.roles=USER,ADMIN